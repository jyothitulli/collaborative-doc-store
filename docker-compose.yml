version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: collab_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${DATABASE_NAME:-collab_wiki}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collab_api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      DATABASE_NAME: ${DATABASE_NAME:-collab_wiki}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./seed:/app/seed

volumes:
  mongo_data:
